query PostHeader($postId: ID!) {
  ...PostHeaderFragment
}

fragment PostHeaderFragment on Query {
  post(id: $postId) {
    id
    title
    subtitle
    publishedAt
    coverImageUrl
    author {
      id
      name
      avatarUrl
      bio
    }
    tags {
      id
      name
      slug
    }
    stats {
      viewCount
      likeCount
      commentCount
    }
  }
}
